<!DOCTYPE html>
<html>
<head>
  <title>MRJ Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {margin:0; font-family:Arial; background:#f2f2f2;}
    header {
      background:#0d6efd; color:#fff;
      padding:15px; text-align:center;
    }

    #search {
      width:90%; padding:10px; margin:10px auto;
      display:block; border-radius:5px; border:1px solid #ccc;
    }

    .products {
      display:flex; flex-wrap:wrap; justify-content:center;
    }

    .card {
      background:#fff; width:220px;
      margin:10px; padding:10px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .card img {
      width:100%; border-radius:10px;
    }

    button {
      background:#28a745; color:#fff;
      border:none; padding:10px;
      margin-top:10px; cursor:pointer;
      border-radius:5px;
    }

    #cart {
      position:fixed;
      right:10px; top:10px;
      background:#fff;
      padding:10px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<header>
  <h1>MRJ Store</h1>
  <p>Your Online Shop</p>
</header>

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

<div id="cart">
  🛒 Items: <span id="count">0</span><br>
  💰 Total: ৳<span id="total">0</span><br>
  <button onclick="order()">Order Now</button>
</div>

<div class="products" id="productList">

  <div class="card" data-name="tshirt">
    <img src="https://via.placeholder.com/200">
    <h3>T-Shirt</h3>
    <p>৳500</p>
    <button onclick="add('T-Shirt',500)">Add</button>
  </div>

  <div class="card" data-name="shoes">
    <img src="https://via.placeholder.com/200">
    <h3>Shoes</h3>
    <p>৳1200</p>
    <button onclick="add('Shoes',1200)">Add</button>
  </div>

  <div class="card" data-name="watch">
    <img src="https://via.placeholder.com/200">
    <h3>Watch</h3>
    <p>৳800</p>
    <button onclick="add('Watch',800)">Add</button>
  </div>

  <div class="card" data-name="bag">
    <img src="https://via.placeholder.com/200">
    <h3>Bag</h3>
    <p>৳900</p>
    <button onclick="add('Bag',900)">Add</button>
  </div>

</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push(name);
  total += price;

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;
}

function order(){
  if(cart.length === 0){
    alert("Cart empty!");
    return;
  }

  let message = "Order list:%0A";
  cart.forEach(item => {
    message += "- " + item + "%0A";
  });
  message += "Total: ৳" + total;

  window.open("https://wa.me/8801234567890?text=" + message);
}

function searchProduct(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    if(name.includes(input)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
